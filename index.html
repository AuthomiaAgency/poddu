<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>

:root {
  --bg:      #0d0d0d;
  --s1:      #161616;
  --s2:      #1f1f1f;
  --border:  rgba(255,255,255,0.08);
  --text:    #f5f5f5;
  --muted:   rgba(245,245,245,0.35);
  --a:       #e8603a;
  --ag:      rgba(232,96,58,0.25);
  --a-break: #4fa8c7;
  --g-break: rgba(79,168,199,0.25);
  --a-long:  #4fad82;
  --g-long:  rgba(79,173,130,0.25);
  --radius:  22px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: transparent;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── SHELL ──────────────────────────────────────── */
.w {
  width:  min(400px, 96vmin);
  height: min(400px, 96vmin);
  background: var(--bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 24px 80px rgba(0,0,0,0.65);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 24px;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.7s ease;
  user-select: none;
}
.w.alive {
  box-shadow:
    0 0 0 1px color-mix(in srgb, var(--cur) 30%, transparent),
    0 24px 80px rgba(0,0,0,0.65);
}

/* ambient glow behind ring when running */
.w::before {
  content: '';
  position: absolute;
  width: 55%; height: 55%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, var(--curglow) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: none;
  z-index: 0;
}
.w.alive::before { opacity: 1; }

/* active color vars — set by JS */
.w {
  --cur:     var(--a);
  --curglow: var(--ag);
}

/* ── TOP ROW ─────────────────────────────────────── */
.top {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 2;
  flex-shrink: 0;
}

/* phase pills */
.phases { display: flex; gap: 4px; }
.ph {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: all 0.22s;
}
.ph:hover { color: var(--text); }
.ph.on {
  color: var(--cur);
  border-color: var(--cur);
  background: var(--curglow);
}

/* top icons */
.top-icons { display: flex; gap: 5px; }
.ico {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--s1);
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px;
  transition: all 0.2s;
}
.ico:hover { color: var(--text); background: var(--s2); }
.ico.on { color: var(--cur); border-color: var(--cur); }

/* ── RING AREA ───────────────────────────────────── */
.ring-area {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  min-height: 0;
  z-index: 2;
  width: 100%;
}

.rsvg {
  width: 80%;
  height: auto;
  max-height: 100%;
  aspect-ratio: 1;
  overflow: visible;
}

/* track */
.rt { fill: none; stroke: var(--s2); stroke-width: 5; }

/* fill arc */
.rf {
  fill: none;
  stroke: var(--cur);
  stroke-width: 5;
  stroke-linecap: round;
  transform-origin: center;
  transform: rotate(-90deg);
  stroke-dasharray: 1068.14;
  stroke-dashoffset: 0;
  transition: stroke 0.45s ease, stroke-dashoffset 1s linear;
  filter: drop-shadow(0 0 5px var(--curglow));
}

/* tip dot */
.rtip {
  fill: var(--cur);
  transition: fill 0.45s ease, opacity 0.3s;
  filter: drop-shadow(0 0 4px var(--curglow));
}

/* center text */
.ct {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  pointer-events: none;
}

/* THE TIME — big, bold, crystal clear */
.time {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(58px, 13.5vmin, 72px);
  font-weight: 400;
  letter-spacing: 4px;
  line-height: 1;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.time.tick { animation: pulse .12s ease; }
@keyframes pulse { 50% { opacity: 0.7; } }

/* session dots */
.dots {
  display: flex; gap: 7px; align-items: center;
}
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--s2);
  border: 1px solid var(--border);
  transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
}
.dot.on {
  background: var(--cur);
  border-color: var(--cur);
  box-shadow: 0 0 6px var(--curglow);
  transform: scale(1.3);
}

/* ── CONTROLS ────────────────────────────────────── */
.controls {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 2;
  flex-shrink: 0;
}

.cb {
  width: 46px; height: 46px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--s1);
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 17px;
  transition: all 0.22s;
  position: relative; overflow: hidden;
}
.cb:hover { color: var(--text); background: var(--s2); transform: scale(1.05); }
.cb:active { transform: scale(0.91); }

/* PLAY button */
.pb {
  width: 58px; height: 58px;
  border-radius: 17px;
  border: none;
  background: var(--cur);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 21px;
  box-shadow: 0 8px 24px var(--curglow), 0 2px 6px rgba(0,0,0,0.35);
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  position: relative; overflow: hidden;
}
.pb:hover { transform: scale(1.09); box-shadow: 0 14px 36px var(--curglow); }
.pb:active { transform: scale(0.9); }

/* ripple */
.rip {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transform: scale(0);
  animation: rip .5s linear forwards;
  pointer-events: none;
}
@keyframes rip { to { transform: scale(6); opacity: 0; } }

/* ── SETTINGS ────────────────────────────────────── */
.sp {
  position: absolute; inset: 0;
  border-radius: var(--radius);
  background: var(--bg);
  z-index: 20;
  padding: 22px;
  overflow-y: auto; scrollbar-width: none;
  transform: translateY(103%);
  transition: transform 0.36s cubic-bezier(.4,0,.2,1);
}
.sp::-webkit-scrollbar { display: none; }
.sp.open { transform: translateY(0); }

.sp-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.sp-title {
  font-size: 13px; font-weight: 500; color: var(--text);
  letter-spacing: 0.2px;
}
.sp-x {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--s1);
  color: var(--muted); display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 13px;
  transition: all 0.2s;
}
.sp-x:hover { color: var(--text); }

.sg { margin-bottom: 24px; }
.sg-label {
  font-size: 9px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px;
}

.sr {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.sr-l { font-size: 12.5px; color: var(--muted); }

/* number control */
.nc { display: flex; align-items: center; gap: 8px; }
.nb {
  width: 28px; height: 28px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--s1);
  color: var(--muted); display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 16px; line-height: 1;
  transition: all 0.18s; user-select: none;
}
.nb:hover { color: var(--text); background: var(--s2); }
.nv {
  font-size: 20px; font-weight: 300;
  color: var(--cur); width: 32px; text-align: center;
  font-variant-numeric: tabular-nums;
  transition: color 0.4s;
}

/* toggle */
.tg {
  width: 40px; height: 22px; border-radius: 11px;
  background: var(--s2); border: 1px solid var(--border);
  position: relative; cursor: pointer; transition: background 0.3s;
  flex-shrink: 0;
}
.tg.on { background: var(--cur); border-color: transparent; }
.tg::after {
  content: ''; position: absolute;
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; top: 2px; left: 2px;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.tg.on::after { transform: translateX(18px); }

/* color swatches */
.swatches { display: flex; gap: 9px; flex-wrap: wrap; }
.swatch {
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.2s;
}
.swatch:hover  { transform: scale(1.2); }
.swatch.on     { border-color: rgba(255,255,255,0.8); transform: scale(1.15); }

/* divider */
hr { border: none; border-top: 1px solid var(--border); margin: 0 0 22px; }

/* ── DONE OVERLAY ────────────────────────────────── */
.done {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: rgba(13,13,13,0.94);
  z-index: 30;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  opacity: 0; pointer-events: none; transition: opacity 0.35s;
}
.done.show { opacity: 1; pointer-events: all; }

.d-emoji { font-size: 52px; animation: epop .45s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes epop { from { transform: scale(0) rotate(-15deg); } to { transform: scale(1); } }

.d-title {
  font-size: 22px; font-weight: 300; color: var(--cur);
  letter-spacing: 0.5px;
}
.d-sub {
  font-size: 12px; color: var(--muted);
  text-align: center; line-height: 1.75; max-width: 200px;
}
.d-btn {
  margin-top: 6px; padding: 11px 32px; border-radius: 13px; border: none;
  background: var(--cur); color: #fff;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; box-shadow: 0 6px 22px var(--curglow);
  transition: all 0.22s;
}
.d-btn:hover { transform: scale(1.06); }

/* confetti */
.cfl { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: var(--radius); }
.cf {
  position: absolute; opacity: 0; border-radius: 2px;
  animation: cff var(--d) var(--dl) ease-in forwards;
}
@keyframes cff {
  0%   { opacity: 1; transform: translateY(0) rotate(0); }
  100% { opacity: 0; transform: translateY(430px) rotate(calc(var(--sp)*1deg)); }
}
</style>
</head>
<body>

<div class="w" id="W">

  <!-- TOP ROW -->
  <div class="top">
    <div class="phases">
      <button class="ph on" id="ph-focus"  onclick="setPhase('focus')">Trabajo</button>
      <button class="ph"    id="ph-break"  onclick="setPhase('break')">Pausa</button>
      <button class="ph"    id="ph-long"   onclick="setPhase('long')">Largo</button>
    </div>
    <div class="top-icons">
      <div class="ico" id="iPopout" title="Ventana flotante [P]" onclick="doPopout()">⤢</div>
      <div class="ico" id="iCfg"    title="Configuración [C]"   onclick="openCfg()">⚙</div>
    </div>
  </div>

  <!-- RING + TIME -->
  <div class="ring-area">
    <svg class="rsvg" id="rsvg" viewBox="0 0 440 440">
      <!-- track -->
      <circle class="rt" cx="220" cy="220" r="170"/>
      <!-- progress -->
      <circle class="rf" id="arc" cx="220" cy="220" r="170"/>
      <!-- tip -->
      <circle class="rtip" id="tip" cx="220" cy="50" r="6"/>
    </svg>

    <div class="ct">
      <div class="time" id="disp">25:00</div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="cb" onclick="doReset(this)" title="Reiniciar [R]" style="font-size:20px">↺</div>
    <div class="pb" id="pbtn" onclick="doPlay(this)" title="[Espacio]">▶</div>
    <div class="cb" onclick="doSkip(this)"  title="Saltar [S]" style="font-size:16px">⏭</div>
  </div>

  <!-- ── SETTINGS ── -->
  <div class="sp" id="SP">
    <div class="sp-top">
      <span class="sp-title">Configuración</span>
      <div class="sp-x" onclick="closeCfg()">✕</div>
    </div>

    <div class="sg">
      <div class="sg-label">Duraciones — minutos</div>
      <div class="sr">
        <span class="sr-l">Trabajo</span>
        <div class="nc">
          <div class="nb" onclick="chD('focus',-1)">−</div>
          <span class="nv" id="dFocus">25</span>
          <div class="nb" onclick="chD('focus',1)">+</div>
        </div>
      </div>
      <div class="sr">
        <span class="sr-l">Pausa corta</span>
        <div class="nc">
          <div class="nb" onclick="chD('break',-1)">−</div>
          <span class="nv" id="dBreak">5</span>
          <div class="nb" onclick="chD('break',1)">+</div>
        </div>
      </div>
      <div class="sr">
        <span class="sr-l">Pausa larga</span>
        <div class="nc">
          <div class="nb" onclick="chD('long',-1)">−</div>
          <span class="nv" id="dLong">15</span>
          <div class="nb" onclick="chD('long',1)">+</div>
        </div>
      </div>
      <div class="sr">
        <span class="sr-l">Ciclos hasta pausa larga</span>
        <div class="nc">
          <div class="nb" onclick="chD('slots',-1)">−</div>
          <span class="nv" id="dSlots">4</span>
          <div class="nb" onclick="chD('slots',1)">+</div>
        </div>
      </div>
    </div>

    <hr>

    <div class="sg">
      <div class="sg-label">Auto-inicio</div>
      <div class="sr">
        <span class="sr-l">Iniciar pausa automáticamente</span>
        <div class="tg" id="tgB" onclick="togOpt('autoBreak')"></div>
      </div>
      <div class="sr">
        <span class="sr-l">Iniciar trabajo automáticamente</span>
        <div class="tg" id="tgF" onclick="togOpt('autoFocus')"></div>
      </div>
    </div>

    <hr>

    <div class="sg">
      <div class="sg-label">Color de acento</div>
      <div class="swatches" id="swRow">
        <div class="swatch on" style="background:#e8603a" data-c="#e8603a" data-g="rgba(232,96,58,0.25)"   onclick="pickC(this)"></div>
        <div class="swatch"    style="background:#e84343" data-c="#e84343" data-g="rgba(232,67,67,0.25)"   onclick="pickC(this)"></div>
        <div class="swatch"    style="background:#c255b5" data-c="#c255b5" data-g="rgba(194,85,181,0.25)"  onclick="pickC(this)"></div>
        <div class="swatch"    style="background:#7c6ee0" data-c="#7c6ee0" data-g="rgba(124,110,224,0.25)" onclick="pickC(this)"></div>
        <div class="swatch"    style="background:#4f7fd4" data-c="#4f7fd4" data-g="rgba(79,127,212,0.25)"  onclick="pickC(this)"></div>
        <div class="swatch"    style="background:#4fa8c7" data-c="#4fa8c7" data-g="rgba(79,168,199,0.25)"  onclick="pickC(this)"></div>
        <div class="swatch"    style="background:#4fad82" data-c="#4fad82" data-g="rgba(79,173,130,0.25)"  onclick="pickC(this)"></div>
        <div class="swatch"    style="background:#b09a40" data-c="#b09a40" data-g="rgba(176,154,64,0.25)"  onclick="pickC(this)"></div>
      </div>
    </div>

  </div>

  <!-- ── DONE ── -->
  <div class="done" id="DONE">
    <div class="cfl" id="CFL"></div>
    <div class="d-emoji" id="dEmoji">✓</div>
    <div class="d-title" id="dTitle">Sesión completa</div>
    <div class="d-sub"   id="dSub"></div>
    <button class="d-btn" onclick="dismissDone()">Continuar →</button>
  </div>

</div>

<script>
// ── CONFIG ───────────────────────────────────────
const D = { focus:25, break:5, long:15, slots:4 };
const O = { autoBreak:false, autoFocus:false };
const CIRC = 2 * Math.PI * 170; // 1068.14

// per-phase colors
const COLORS = {
  focus:  { a:'#e8603a', g:'rgba(232,96,58,0.25)'  },
  break:  { a:'#4fa8c7', g:'rgba(79,168,199,0.25)' },
  long:   { a:'#4fad82', g:'rgba(79,173,130,0.25)' },
};
const DONE_META = {
  focus:  { icon:'✓', title:'Sesión completa',  sub:'Tiempo de tomar un descanso.' },
  break:  { icon:'→', title:'Pausa terminada',  sub:'De vuelta al trabajo.' },
  long:   { icon:'✦', title:'Listo',            sub:'Recargado. ¡Adelante!' },
};

let phase   = 'focus';
let timeLeft, total;
let running = false;
let ticker  = null;
let sessions = 0;

// ── PHASE ────────────────────────────────────────
function setPhase(p, autoStart = false) {
  if (running) stopTimer();
  phase = p;
  timeLeft = total = D[p] * 60;

  const col = COLORS[p];
  const W   = document.getElementById('W');
  W.style.setProperty('--cur',     col.a);
  W.style.setProperty('--curglow', col.g);

  // update arc stroke via CSS var reflection
  document.getElementById('arc').style.stroke = col.a;
  document.getElementById('tip').style.fill   = col.a;

  // pills
  ['focus','break','long'].forEach(k =>
    document.getElementById('ph-'+k).classList.toggle('on', k === p));

  document.getElementById('pbtn').textContent = '▶';
  refreshDisp();
  refreshRing();
  buildDots();

  if (autoStart) {
    if (p !== 'focus' && O.autoBreak) startTimer();
    if (p === 'focus' && O.autoFocus) startTimer();
  }
}

// ── TIMER ────────────────────────────────────────
function doPlay(btn) {
  addRipple(btn);
  running ? stopTimer() : startTimer();
}
function startTimer() {
  running = true;
  document.getElementById('pbtn').textContent = '⏸';
  document.getElementById('W').classList.add('alive');
  ticker = setInterval(() => {
    timeLeft--;
    refreshDisp(true);
    refreshRing();
    if (timeLeft <= 0) phaseDone();
  }, 1000);
}
function stopTimer() {
  running = false;
  clearInterval(ticker);
  document.getElementById('pbtn').textContent = '▶';
  document.getElementById('W').classList.remove('alive');
}
function doReset(btn) {
  addRipple(btn);
  stopTimer();
  timeLeft = total = D[phase] * 60;
  refreshDisp(); refreshRing();
}
function doSkip(btn) {
  addRipple(btn);
  stopTimer();
  advance(true);
}
function phaseDone() {
  stopTimer();
  showDone();
}
function advance(skip = false) {
  if (phase === 'focus') {
    sessions++;
    buildDots();
    setPhase(sessions % D.slots === 0 ? 'long' : 'break', !skip);
  } else {
    setPhase('focus', !skip);
  }
}

// ── DISPLAY ──────────────────────────────────────
function refreshDisp(tick = false) {
  const m   = Math.floor(timeLeft / 60);
  const s   = timeLeft % 60;
  const el  = document.getElementById('disp');
  el.textContent = pad(m) + ':' + pad(s);
  document.title = pad(m) + ':' + pad(s);
  if (tick) {
    el.classList.remove('tick');
    void el.offsetWidth;
    el.classList.add('tick');
  }
}
function refreshRing() {
  const pct    = total > 0 ? timeLeft / total : 1;
  const offset = CIRC * (1 - pct);
  document.getElementById('arc').style.strokeDashoffset = offset;

  // tip position
  const angle = -Math.PI / 2 + (1 - pct) * 2 * Math.PI;
  const cx    = 220 + 170 * Math.cos(angle);
  const cy    = 220 + 170 * Math.sin(angle);
  const tip   = document.getElementById('tip');
  tip.setAttribute('cx', cx);
  tip.setAttribute('cy', cy);
  tip.style.opacity = (pct > 0.008 && pct < 0.997) ? '1' : '0';
}

// ── DOTS ─────────────────────────────────────────
function buildDots() {
  const row  = document.getElementById('dots');
  const n    = Math.min(D.slots, 8);
  const done = sessions % D.slots;
  row.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < done ? ' on' : '');
    row.appendChild(d);
  }
}

// ── DONE ─────────────────────────────────────────
function showDone() {
  const m = DONE_META[phase];
  document.getElementById('dEmoji').textContent = m.icon;
  document.getElementById('dTitle').textContent = m.title;
  document.getElementById('dSub').textContent   = m.sub;
  confetti();
  document.getElementById('DONE').classList.add('show');
}
function dismissDone() {
  document.getElementById('DONE').classList.remove('show');
  advance();
}
function confetti() {
  const L = document.getElementById('CFL');
  L.innerHTML = '';
  const pal = ['#e8603a','#fcd34d','#4fa8c7','#7c6ee0','#4fad82'];
  for (let i = 0; i < 45; i++) {
    const e = document.createElement('div');
    e.className = 'cf';
    const sz = 5 + Math.random()*7;
    e.style.cssText =
      `left:${Math.random()*100}%;top:-10px;`+
      `width:${sz}px;height:${sz}px;`+
      `background:${pal[i%pal.length]};`+
      `border-radius:${Math.random()>.5?'50%':'2px'};`+
      `--d:${1.1+Math.random()*.9}s;`+
      `--dl:${Math.random()*.55}s;`+
      `--sp:${280+Math.random()*500};`;
    L.appendChild(e);
  }
}

// ── SETTINGS ─────────────────────────────────────
function openCfg() {
  document.getElementById('SP').classList.add('open');
  document.getElementById('iCfg').classList.add('on');
}
function closeCfg() {
  document.getElementById('SP').classList.remove('open');
  document.getElementById('iCfg').classList.remove('on');
  if (!running) { timeLeft = total = D[phase]*60; refreshDisp(); refreshRing(); }
  buildDots();
}
function chD(k, delta) {
  const lim = { focus:[1,120], break:[1,30], long:[1,60], slots:[2,8] };
  const ids  = { focus:'dFocus', break:'dBreak', long:'dLong', slots:'dSlots' };
  D[k] = Math.max(lim[k][0], Math.min(lim[k][1], D[k] + delta));
  document.getElementById(ids[k]).textContent = D[k];
}
function togOpt(k) {
  O[k] = !O[k];
  document.getElementById(k==='autoBreak'?'tgB':'tgF').classList.toggle('on', O[k]);
}
function pickC(el) {
  const c = el.dataset.c, g = el.dataset.g;
  // update focus accent tokens only
  document.documentElement.style.setProperty('--a', c);
  document.documentElement.style.setProperty('--ag', g);
  COLORS.focus.a = c; COLORS.focus.g = g;
  // re-apply if currently on focus phase
  if (phase === 'focus') {
    document.getElementById('W').style.setProperty('--cur', c);
    document.getElementById('W').style.setProperty('--curglow', g);
    document.getElementById('arc').style.stroke = c;
    document.getElementById('tip').style.fill   = c;
  }
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('on', s===el));
}

// ── POPOUT ───────────────────────────────────────
function doPopout() {
  const sz = Math.min(440, screen.width * 0.9);
  const win = window.open('', '_blank',
    `width=${sz},height=${sz},resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`);
  if (win) { win.document.write('<!DOCTYPE html>' + document.documentElement.outerHTML); win.document.close(); }
}

// ── RIPPLE ───────────────────────────────────────
function addRipple(el) {
  const r  = document.createElement('span');
  r.className = 'rip';
  const sz = Math.max(el.offsetWidth, el.offsetHeight);
  r.style.cssText = `width:${sz}px;height:${sz}px;left:0;top:0`;
  el.appendChild(r);
  r.addEventListener('animationend', ()=>r.remove());
}

// ── KEYBOARD ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code==='Space') { e.preventDefault(); doPlay(document.getElementById('pbtn')); }
  if (e.key==='r'||e.key==='R') doReset(document.querySelector('.cb'));
  if (e.key==='s'||e.key==='S') doSkip(document.querySelectorAll('.cb')[1]);
  if (e.key==='c'||e.key==='C') openCfg();
  if (e.key==='p'||e.key==='P') doPopout();
  if (e.key==='Escape') closeCfg();
});

// ── UTILS ────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }

// ── INIT ─────────────────────────────────────────
setPhase('focus', false);
</script>
