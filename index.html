<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ────────────────────────────────────── */
:root {
  --bg:  #191919; --s1: #222; --s2: #2c2c2c;
  --bd:  rgba(255,255,255,0.07);
  --txt: #f0f0f0; --mut: rgba(240,240,240,0.34);
  --cur: #e8603a; --curG: rgba(232,96,58,0.26);
}
body.lt {
  --bg:  #ffffff; --s1: #f2f1ef; --s2: #e6e5e2;
  --bd:  rgba(0,0,0,0.08);
  --txt: #181818; --mut: rgba(18,18,18,0.38);
}
/* popout card look */
body.po {
  background: #0e0e0e !important;
  align-items: center; justify-content: center;
}
body.po .w {
  border-radius: 20px !important;
  box-shadow: 0 32px 90px rgba(0,0,0,0.85) !important;
  border: 1px solid rgba(255,255,255,0.07) !important;
  width:  min(96vmin,96vw)  !important;
  height: min(96vmin,96vh) !important;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background: var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  transition: background .35s;
}

/* ─── WIDGET SHELL ─────────────────────────────── */
.w {
  width:100vmin; height:100vmin;
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:space-between;
  position:relative; overflow:hidden;
  border-radius:0; border:none; box-shadow:none;
  transition: background .35s;
}

/* ambient glow */
.w::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(circle at 50% 52%, var(--curG) 0%, transparent 62%);
  opacity:0; transition:opacity .8s;
}
.w.alive::before { opacity:1; }

/* ─── PHASE TABS ───────────────────────────────── */
.top {
  width:100%; display:flex; align-items:center;
  padding: clamp(10px,3vmin,22px) clamp(10px,4vmin,24px) 0;
  z-index:2; flex-shrink:0;
}
.phases { display:flex; gap:clamp(3px,1vmin,8px); }
.ph {
  padding: clamp(4px,.9vmin,7px) clamp(9px,2.6vmin,17px);
  border-radius:20px; border:1px solid transparent;
  background:transparent; color:var(--mut);
  font-family:'Inter',sans-serif;
  font-size:clamp(9px,2.2vmin,13px); font-weight:500;
  cursor:pointer; transition:all .22s;
}
.ph:hover { color:var(--txt); }
.ph.on { color:var(--cur); border-color:var(--cur); background:var(--curG); }

/* ─── RING ─────────────────────────────────────── */
.ring-area {
  flex:1; min-height:0; position:relative;
  display:flex; align-items:center; justify-content:center;
  width:100%; z-index:2;
}
.rsvg { width:75%; height:auto; max-height:100%; aspect-ratio:1; overflow:visible; }
.rt { fill:none; stroke:var(--s2); stroke-width:4; }
.rf {
  fill:none; stroke:var(--cur); stroke-width:4; stroke-linecap:round;
  transform-origin:center; transform:rotate(-90deg);
  stroke-dasharray:1068.14; stroke-dashoffset:0;
  transition:stroke .4s, stroke-dashoffset 1s linear;
  filter:drop-shadow(0 0 4px var(--curG));
}
.rtip {
  fill:var(--cur); opacity:0;
  transition:fill .4s, opacity .3s;
  filter:drop-shadow(0 0 3px var(--curG));
}
.ct {
  position:absolute; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:clamp(4px,1.5vmin,10px); pointer-events:none;
}
.time {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(30px,13vmin,80px);
  font-weight:400; letter-spacing:3px; line-height:1;
  color:var(--txt); font-variant-numeric:tabular-nums;
}
.time.tick { animation:pulse .12s ease; }
@keyframes pulse { 50%{opacity:.65} }
.sdots { display:flex; gap:clamp(4px,1.4vmin,9px); align-items:center; }
.sdot {
  width:clamp(4px,1.1vmin,6px); height:clamp(4px,1.1vmin,6px);
  border-radius:50%; background:var(--s2); border:1px solid var(--bd);
  transition:all .4s cubic-bezier(.34,1.56,.64,1);
}
.sdot.on {
  background:var(--cur); border-color:var(--cur);
  box-shadow:0 0 5px var(--curG); transform:scale(1.3);
}

/* ─── CONTROLS ──────────────────────────────────── */
.ctrls {
  display:flex; align-items:center; justify-content:center;
  gap:clamp(8px,3vmin,18px);
  padding: 0 4vmin clamp(12px,4.5vmin,30px);
  z-index:2; flex-shrink:0;
}
.cb {
  width:clamp(34px,9.5vmin,50px); height:clamp(34px,9.5vmin,50px);
  border-radius:clamp(8px,2.2vmin,14px);
  border:1px solid var(--bd); background:var(--s1); color:var(--mut);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:clamp(12px,3.5vmin,19px);
  transition:all .22s; position:relative; overflow:hidden;
}
.cb:hover { color:var(--txt); background:var(--s2); transform:scale(1.05); }
.cb:active{ transform:scale(.91); }
.pb {
  width:clamp(44px,12.5vmin,64px); height:clamp(44px,12.5vmin,64px);
  border-radius:clamp(11px,3vmin,19px);
  border:none; background:var(--cur); color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:clamp(15px,4.2vmin,23px);
  box-shadow:0 6px 22px var(--curG);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative; overflow:hidden;
}
.pb:hover  { transform:scale(1.09); box-shadow:0 12px 34px var(--curG); }
.pb:active { transform:scale(.9); }
.rip {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,.2); transform:scale(0);
  animation:rip .5s linear forwards; pointer-events:none;
}
@keyframes rip { to{transform:scale(6);opacity:0} }

/* ─── CORNER BUTTONS (bottom-left) ─────────────── */
.corner {
  position:absolute;
  bottom:clamp(8px,2.8vmin,18px);
  left: clamp(8px,2.8vmin,18px);
  display:flex; gap:clamp(4px,1.2vmin,8px);
  z-index:5;
}
.ico {
  width:clamp(22px,5.5vmin,30px); height:clamp(22px,5.5vmin,30px);
  border-radius:7px; border:1px solid var(--bd); background:var(--s1);
  color:var(--mut);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:clamp(9px,2.2vmin,12px);
  transition:all .2s; position:relative;
}
.ico:hover { color:var(--txt); background:var(--s2); }
.ico.on    { color:var(--cur); border-color:var(--cur); }

/* popout anchor — invisible, used for the link */
.ico a {
  position:absolute; inset:0; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  color:inherit; text-decoration:none; font-size:inherit;
}

/* ─── SETTINGS PANEL ────────────────────────────── */
.sp {
  position:absolute; inset:0; background:var(--bg); z-index:20;
  padding:clamp(14px,4vmin,24px);
  overflow-y:auto; scrollbar-width:none;
  transform:translateY(106%);
  transition:transform .36s cubic-bezier(.4,0,.2,1);
}
.sp::-webkit-scrollbar { display:none; }
.sp.open { transform:translateY(0); }
.sp-hd {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:clamp(12px,3.5vmin,22px);
}
.sp-title { font-size:clamp(11px,2.8vmin,15px); font-weight:500; color:var(--txt); }
.sp-x {
  width:clamp(20px,5.5vmin,28px); height:clamp(20px,5.5vmin,28px);
  border-radius:7px; border:1px solid var(--bd); background:var(--s1);
  color:var(--mut); display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:clamp(9px,2.2vmin,12px); transition:all .2s;
}
.sp-x:hover { color:var(--txt); }
.sg { margin-bottom:clamp(10px,3vmin,20px); }
.sg-lbl {
  font-size:clamp(7px,1.8vmin,9.5px); font-weight:600;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--mut); margin-bottom:clamp(8px,2.2vmin,14px);
}
.sr {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:clamp(7px,1.8vmin,12px);
}
.sr-l { font-size:clamp(10px,2.4vmin,13px); color:var(--mut); }
.nc { display:flex; align-items:center; gap:clamp(5px,1.4vmin,9px); }
.nb {
  width:clamp(20px,5vmin,28px); height:clamp(20px,5vmin,28px);
  border-radius:6px; border:1px solid var(--bd); background:var(--s1);
  color:var(--mut); display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:clamp(12px,3vmin,16px); line-height:1;
  transition:all .18s; user-select:none;
}
.nb:hover { color:var(--txt); background:var(--s2); }
.nv {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(15px,3.8vmin,21px); color:var(--cur);
  width:clamp(22px,5vmin,32px); text-align:center;
}
.tg {
  width:clamp(30px,6.5vmin,40px); height:clamp(17px,3.8vmin,21px);
  border-radius:11px; background:var(--s2); border:1px solid var(--bd);
  position:relative; cursor:pointer; transition:background .3s; flex-shrink:0;
}
.tg.on { background:var(--cur); border-color:transparent; }
.tg::after {
  content:''; position:absolute;
  width:clamp(11px,2.8vmin,15px); height:clamp(11px,2.8vmin,15px);
  border-radius:50%; background:#fff; top:2px; left:2px;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.tg.on::after { transform:translateX(clamp(13px,2.8vmin,19px)); }
.sw-row { display:flex; gap:clamp(6px,1.7vmin,10px); flex-wrap:wrap; margin-top:4px; }
.sw {
  width:clamp(16px,4vmin,24px); height:clamp(16px,4vmin,24px);
  border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all .2s;
}
.sw:hover { transform:scale(1.22); }
.sw.on { border-color:rgba(255,255,255,.8); transform:scale(1.15); }
body.lt .sw.on { border-color:rgba(0,0,0,.6); }
hr { border:none; border-top:1px solid var(--bd); margin:0 0 clamp(10px,3vmin,20px); }

/* ─── DONE OVERLAY ──────────────────────────────── */
.done {
  position:absolute; inset:0; background:var(--bg); z-index:30;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:clamp(8px,2vmin,14px); opacity:0; pointer-events:none; transition:opacity .35s;
}
.done.show { opacity:1; pointer-events:all; }
.d-ico { font-size:clamp(32px,9vmin,54px); animation:epop .45s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes epop { from{transform:scale(0) rotate(-15deg)} to{transform:scale(1)} }
.d-h { font-size:clamp(14px,4.2vmin,22px); font-weight:300; color:var(--cur); letter-spacing:.5px; }
.d-p { font-size:clamp(10px,2.3vmin,13px); color:var(--mut); text-align:center; line-height:1.7; max-width:60vmin; }
.d-btn {
  margin-top:clamp(4px,1vmin,8px);
  padding:clamp(8px,2vmin,12px) clamp(18px,4.5vmin,30px);
  border-radius:clamp(9px,2.2vmin,13px); border:none;
  background:var(--cur); color:#fff;
  font-family:'Inter',sans-serif; font-size:clamp(10px,2.3vmin,13px); font-weight:500;
  cursor:pointer; box-shadow:0 5px 20px var(--curG); transition:all .22s;
}
.d-btn:hover { transform:scale(1.06); }
.cfl { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.cf {
  position:absolute; opacity:0; border-radius:2px;
  animation:cff var(--d) var(--dl) ease-in forwards;
}
@keyframes cff {
  0%   { opacity:1; transform:translateY(0) rotate(0); }
  100% { opacity:0; transform:translateY(110vmin) rotate(calc(var(--sp)*1deg)); }
}
</style>
</head>
<body>

<div class="w" id="W">

  <!-- PHASE TABS -->
  <div class="top">
    <div class="phases">
      <button class="ph on" id="ph-focus" onclick="setPhase('focus')">Trabajo</button>
      <button class="ph"    id="ph-break" onclick="setPhase('break')">Pausa</button>
      <button class="ph"    id="ph-long"  onclick="setPhase('long')">Largo</button>
    </div>
  </div>

  <!-- RING + TIME -->
  <div class="ring-area">
    <svg class="rsvg" viewBox="0 0 440 440">
      <circle class="rt"   cx="220" cy="220" r="170"/>
      <circle class="rf"   id="arc" cx="220" cy="220" r="170"/>
      <circle class="rtip" id="tip" cx="220" cy="50"  r="6"/>
    </svg>
    <div class="ct">
      <div class="time"  id="disp">25:00</div>
      <div class="sdots" id="dots"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="ctrls">
    <div class="cb" id="btnR" onclick="doReset(this)" title="Reiniciar [R]" style="font-size:clamp(13px,3.6vmin,19px)">↺</div>
    <div class="pb" id="pbtn" onclick="doPlay(this)">▶</div>
    <div class="cb" id="btnS" onclick="doSkip(this)"  title="Saltar [S]"    style="font-size:clamp(10px,3vmin,15px)">⏭</div>
  </div>

  <!-- BOTTOM-LEFT CORNER BUTTONS -->
  <div class="corner">
    <!-- Popout: simple <a> with target=_blank — works even inside sandboxed iframes -->
    <div class="ico" id="icoP" title="Abrir en ventana [P]">
      <a id="popLink" href="#" target="_blank" rel="noopener" onclick="return handlePopout(event)">⤢</a>
    </div>
    <div class="ico" id="icoC" title="Configuración [C]" onclick="openCfg()">⚙</div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="sp" id="SP">
    <div class="sp-hd">
      <span class="sp-title">Configuración</span>
      <div class="sp-x" onclick="closeCfg()">✕</div>
    </div>

    <div class="sg">
      <div class="sg-lbl">Apariencia</div>
      <div class="sr">
        <span class="sr-l">Tema claro</span>
        <div class="tg" id="tgTh" onclick="togTheme()"></div>
      </div>
    </div>
    <hr>

    <div class="sg">
      <div class="sg-lbl">Duraciones — minutos</div>
      <div class="sr"><span class="sr-l">Trabajo</span>
        <div class="nc">
          <div class="nb" onclick="chD('focus',-1)">−</div>
          <span class="nv" id="dF">25</span>
          <div class="nb" onclick="chD('focus',1)">+</div>
        </div>
      </div>
      <div class="sr"><span class="sr-l">Pausa corta</span>
        <div class="nc">
          <div class="nb" onclick="chD('break',-1)">−</div>
          <span class="nv" id="dB">5</span>
          <div class="nb" onclick="chD('break',1)">+</div>
        </div>
      </div>
      <div class="sr"><span class="sr-l">Pausa larga</span>
        <div class="nc">
          <div class="nb" onclick="chD('long',-1)">−</div>
          <span class="nv" id="dL">15</span>
          <div class="nb" onclick="chD('long',1)">+</div>
        </div>
      </div>
      <div class="sr"><span class="sr-l">Ciclos hasta pausa larga</span>
        <div class="nc">
          <div class="nb" onclick="chD('slots',-1)">−</div>
          <span class="nv" id="dS">4</span>
          <div class="nb" onclick="chD('slots',1)">+</div>
        </div>
      </div>
    </div>
    <hr>

    <div class="sg">
      <div class="sg-lbl">Auto-inicio</div>
      <div class="sr"><span class="sr-l">Iniciar pausa automáticamente</span>
        <div class="tg" id="tgB" onclick="togOpt('autoBreak')"></div>
      </div>
      <div class="sr"><span class="sr-l">Iniciar trabajo automáticamente</span>
        <div class="tg" id="tgF" onclick="togOpt('autoFocus')"></div>
      </div>
    </div>
    <hr>

    <div class="sg">
      <div class="sg-lbl">Color de acento (trabajo)</div>
      <div class="sw-row" id="swRow">
        <div class="sw on" style="background:#e8603a" data-c="#e8603a" data-g="rgba(232,96,58,0.26)"   onclick="pickC(this)"></div>
        <div class="sw"    style="background:#e04040" data-c="#e04040" data-g="rgba(224,64,64,0.26)"   onclick="pickC(this)"></div>
        <div class="sw"    style="background:#c050b0" data-c="#c050b0" data-g="rgba(192,80,176,0.26)"  onclick="pickC(this)"></div>
        <div class="sw"    style="background:#7a68e0" data-c="#7a68e0" data-g="rgba(122,104,224,0.26)" onclick="pickC(this)"></div>
        <div class="sw"    style="background:#4878d0" data-c="#4878d0" data-g="rgba(72,120,208,0.26)"  onclick="pickC(this)"></div>
        <div class="sw"    style="background:#4fa8c7" data-c="#4fa8c7" data-g="rgba(79,168,199,0.26)"  onclick="pickC(this)"></div>
        <div class="sw"    style="background:#4fad82" data-c="#4fad82" data-g="rgba(79,173,130,0.26)"  onclick="pickC(this)"></div>
        <div class="sw"    style="background:#b09530" data-c="#b09530" data-g="rgba(176,149,48,0.26)"  onclick="pickC(this)"></div>
      </div>
    </div>
  </div>

  <!-- DONE OVERLAY -->
  <div class="done" id="DONE">
    <div class="cfl" id="CFL"></div>
    <div class="d-ico" id="dIco">✓</div>
    <div class="d-h"   id="dH">Sesión completa</div>
    <div class="d-p"   id="dP"></div>
    <button class="d-btn" onclick="dismissDone()">Continuar →</button>
  </div>

</div><!-- /w -->

<script>
// ── STATE ─────────────────────────────────────────
const D = { focus:25, break:5, long:15, slots:4 };
const O = { autoBreak:false, autoFocus:false };
const CIRC = 2 * Math.PI * 170; // 1068.14

const COLORS = {
  focus: { a:'#e8603a', g:'rgba(232,96,58,0.26)'  },
  break: { a:'#4fa8c7', g:'rgba(79,168,199,0.26)' },
  long:  { a:'#4fad82', g:'rgba(79,173,130,0.26)' },
};
const META = {
  focus: { ico:'✓', h:'Sesión completa',  p:'Tómate el descanso que mereces.' },
  break: { ico:'→', h:'Pausa terminada',  p:'De vuelta al trabajo.' },
  long:  { ico:'✦', h:'Listo',            p:'Recargado. ¡Adelante!' },
};

let phase='focus', timeLeft, total, running=false, ticker=null, sessions=0;

// ── POPOUT ───────────────────────────────────────
// Strategy: use a real <a target="_blank"> so it works
// even inside sandboxed iframes (Notion).
// The link points to this same page + ?po=1
// On load we detect ?po=1 and apply card styling.
function handlePopout(e) {
  e.preventDefault();
  const base = window.location.href.split('?')[0];
  const url  = base + '?po=1';
  // Try named window — avoids opening multiple tabs on re-click
  const win  = window.open(url, 'pomo_float',
    'width=430,height=430,resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no');
  if (!win) {
    // Popup blocked: navigate the link normally as new tab
    window.open(url, '_blank');
  }
  return false;
}

// Detect popout mode
(function(){
  const p = new URLSearchParams(window.location.search);
  if (p.get('po') === '1') {
    document.body.classList.add('po');
    document.title = '⏱ Focus Timer';
  }
})();

// ── PHASE ────────────────────────────────────────
function setPhase(p, auto=false) {
  if (running) stopTimer();
  phase = p;
  timeLeft = total = D[p] * 60;
  const col = COLORS[p];
  const W = document.getElementById('W');
  W.style.setProperty('--cur',  col.a);
  W.style.setProperty('--curG', col.g);
  document.getElementById('arc').style.stroke = col.a;
  document.getElementById('tip').style.fill   = col.a;
  ['focus','break','long'].forEach(k =>
    document.getElementById('ph-'+k).classList.toggle('on', k===p));
  document.getElementById('pbtn').textContent = '▶';
  refreshDisp(); refreshRing(); buildDots();
  if (auto) {
    if (p!=='focus' && O.autoBreak) startTimer();
    if (p==='focus' && O.autoFocus) startTimer();
  }
}

// ── TIMER ────────────────────────────────────────
function doPlay(btn) { ripple(btn); running ? stopTimer() : startTimer(); }
function startTimer() {
  running = true;
  document.getElementById('pbtn').textContent = '⏸';
  document.getElementById('W').classList.add('alive');
  ticker = setInterval(()=>{ timeLeft--; refreshDisp(true); refreshRing(); if(timeLeft<=0) phaseDone(); }, 1000);
}
function stopTimer() {
  running = false; clearInterval(ticker);
  document.getElementById('pbtn').textContent = '▶';
  document.getElementById('W').classList.remove('alive');
}
function doReset(btn) { ripple(btn); stopTimer(); timeLeft=total=D[phase]*60; refreshDisp(); refreshRing(); }
function doSkip(btn)  { ripple(btn); stopTimer(); advance(true); }
function phaseDone()  { stopTimer(); showDone(); }
function advance(skip=false) {
  if (phase==='focus') { sessions++; buildDots(); setPhase(sessions%D.slots===0?'long':'break',!skip); }
  else { setPhase('focus',!skip); }
}

// ── DISPLAY ──────────────────────────────────────
function refreshDisp(tick=false) {
  const el = document.getElementById('disp');
  el.textContent = pad(Math.floor(timeLeft/60))+':'+pad(timeLeft%60);
  document.title = el.textContent + (document.body.classList.contains('po') ? ' ⏱' : '');
  if (tick) { el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick'); }
}
function refreshRing() {
  const pct = total>0 ? timeLeft/total : 1;
  document.getElementById('arc').style.strokeDashoffset = CIRC*(1-pct);
  const a = -Math.PI/2 + (1-pct)*2*Math.PI;
  const tip = document.getElementById('tip');
  tip.setAttribute('cx', 220+170*Math.cos(a));
  tip.setAttribute('cy', 220+170*Math.sin(a));
  tip.style.opacity = (pct>0.008 && pct<0.997) ? '1' : '0';
}
function buildDots() {
  const row=document.getElementById('dots'), n=Math.min(D.slots,8), done=sessions%D.slots;
  row.innerHTML='';
  for(let i=0;i<n;i++){const d=document.createElement('div');d.className='sdot'+(i<done?' on':'');row.appendChild(d);}
}

// ── DONE ──────────────────────────────────────────
function showDone() {
  const m=META[phase];
  document.getElementById('dIco').textContent=m.ico;
  document.getElementById('dH').textContent=m.h;
  document.getElementById('dP').textContent=m.p;
  confetti();
  document.getElementById('DONE').classList.add('show');
}
function dismissDone() { document.getElementById('DONE').classList.remove('show'); advance(); }
function confetti() {
  const L=document.getElementById('CFL'); L.innerHTML='';
  const pal=['#e8603a','#fcd34d','#4fa8c7','#7a68e0','#4fad82'];
  for(let i=0;i<44;i++){
    const e=document.createElement('div'); e.className='cf';
    const s=4+Math.random()*7;
    e.style.cssText=`left:${Math.random()*100}%;top:-8px;width:${s}px;height:${s}px;`+
      `background:${pal[i%pal.length]};border-radius:${Math.random()>.5?'50%':'2px'};`+
      `--d:${1+Math.random()*.9}s;--dl:${Math.random()*.5}s;--sp:${260+Math.random()*500};`;
    L.appendChild(e);
  }
}

// ── SETTINGS ─────────────────────────────────────
function openCfg()  { document.getElementById('SP').classList.add('open');  document.getElementById('icoC').classList.add('on'); }
function closeCfg() {
  document.getElementById('SP').classList.remove('open');
  document.getElementById('icoC').classList.remove('on');
  if (!running) { timeLeft=total=D[phase]*60; refreshDisp(); refreshRing(); }
  buildDots();
}
function chD(k,d) {
  const lim={focus:[1,120],break:[1,30],long:[1,60],slots:[2,8]};
  const ids={focus:'dF',break:'dB',long:'dL',slots:'dS'};
  D[k]=Math.max(lim[k][0],Math.min(lim[k][1],D[k]+d));
  document.getElementById(ids[k]).textContent=D[k];
}
function togOpt(k) {
  O[k]=!O[k];
  document.getElementById(k==='autoBreak'?'tgB':'tgF').classList.toggle('on',O[k]);
}
function togTheme() {
  const lt=document.body.classList.toggle('lt');
  document.getElementById('tgTh').classList.toggle('on',lt);
}
function pickC(el) {
  COLORS.focus.a=el.dataset.c; COLORS.focus.g=el.dataset.g;
  if (phase==='focus') {
    document.getElementById('W').style.setProperty('--cur',el.dataset.c);
    document.getElementById('W').style.setProperty('--curG',el.dataset.g);
    document.getElementById('arc').style.stroke=el.dataset.c;
    document.getElementById('tip').style.fill  =el.dataset.c;
  }
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s===el));
}

// ── KEYBOARD ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.code==='Space') { e.preventDefault(); doPlay(document.getElementById('pbtn')); }
  if (e.key==='r'||e.key==='R') doReset(document.getElementById('btnR'));
  if (e.key==='s'||e.key==='S') doSkip(document.getElementById('btnS'));
  if (e.key==='c'||e.key==='C') { document.getElementById('SP').classList.contains('open') ? closeCfg() : openCfg(); }
  if (e.key==='Escape') closeCfg();
});

// ── UTILS ─────────────────────────────────────────
function ripple(el) {
  const r=document.createElement('span'); r.className='rip';
  const s=Math.max(el.offsetWidth,el.offsetHeight);
  r.style.cssText=`width:${s}px;height:${s}px;left:0;top:0`;
  el.appendChild(r); r.addEventListener('animationend',()=>r.remove());
}
function pad(n) { return String(n).padStart(2,'0'); }

// ── INIT ──────────────────────────────────────────
setPhase('focus', false);
</script>
